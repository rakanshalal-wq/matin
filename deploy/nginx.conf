# =============================================================================
# deploy/nginx.conf — Nginx لمنصة متين مع Wildcard Subdomains
#
# يدعم:
#   matin.ink              ← الصفحة الرئيسية والـ dashboard
#   *.matin.ink            ← كل مدرسة على subdomain مستقل
#
# المتطلبات:
#   1. SSL wildcard جاهز (شاهد deploy/ssl-setup.sh)
#   2. Next.js يعمل على المنفذ 3000
#   3. استبدل YOUR_SERVER_IP و matin.ink بقيمك الفعلية
#
# نسخ الملف:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/matin
#   sudo ln -sf /etc/nginx/sites-available/matin /etc/nginx/sites-enabled/matin
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── إعادة توجيه HTTP → HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name matin.ink *.matin.ink;

    # للتحقق من Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── النطاق الرئيسي: matin.ink ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matin.ink;

    ssl_certificate     /etc/letsencrypt/live/matin.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matin.ink/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ضغط الاستجابات
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # الحد الأقصى لحجم الرفع
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # الملفات الثابتة من Next.js
    location /_next/static/ {
        alias /var/www/matin/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        alias /var/www/matin/public/;
        add_header Cache-Control "public, max-age=86400";
    }

    # توجيه كل الطلبات إلى Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ── Wildcard Subdomains: *.matin.ink ─────────────────────────────────────────
# كل مدرسة تحصل على subdomain: school1.matin.ink, school2.matin.ink ...
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.matin.ink;

    # نفس شهادة Wildcard
    ssl_certificate     /etc/letsencrypt/live/matin.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matin.ink/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    client_max_body_size 50M;

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;

    location /_next/static/ {
        alias /var/www/matin/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js يستقبل $host ويستخدمه لتحديد المدرسة
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
